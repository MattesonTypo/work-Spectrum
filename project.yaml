# This file is used to configure the build and test process for SpectrumNow

roman: # These settings are unique for the respective font. Shared settings are in _common.
  base: _common
  sources:
    glyphs: Source/SpectrumNow.glyphs
  output_filename: SpectrumNowVar.ttf
  tables:
    name:
      1: Spectrum Now Var
      2: Regular
      3: The Monotype Corporation:Spectrum Now Var:2024
      4: Spectrum Now Var
      6: SpectrumNowVar
      25: SpectrumNowVar
    STAT:
      axes:
        - tag: ital
          name: Italic
          ordering: 2
          values:
            - name: Regular
              value: 0
              flags: 0x2
              linkedValue: 1
italic: # These settings are unique for the respective font. Shared settings are in _common.
  base: _common
  sources:
    glyphs: Source/SpectrumNow-Italic.glyphs
  output_filename: SpectrumNowVar-Italic.ttf
  tables:
    name:
      1: Spectrum Now Var
      2: Italic
      3: The Monotype Corporation:Spectrum Now Var Italic:2024
      4: Spectrum Now Var Italic
      6: SpectrumNowVarItalic
      25: SpectrumNowVarItalic
    STAT:
      axes:
        - tag: ital
          name: Italic
          ordering: 2
          values:
            - name: Italic
              value: 1


_common: # _common are the settings that are shared between the roman and italic.
  project_name: Spectrum
  build_plan: glyphs_to_variable_font
  font_version: 1.00
  action_scripts:
    - Source/build_actions.py
  actions:
    - name: filter_bg_layers
    - name: remove_name_id
      argument: (16, 17)
  tables:
    head:
      fontRevision: '{font_version}'
    meta:
      dlng: Latn
      slng: Latn
      bild: '{toolchain_versions}; project git revision: {git_revision}'
    name:
      0: '© 2024 The Monotype Corporation. All Rights Reserved.'
      5: 'Version 1.00'
      8: 'The Monotype Corporation'
      9: 'Jan van Krimpen, Steve Matteson'
      11: 'https://microsoft.com/'
      12: 'https://mattesontypographics.com/'
      13: 'Microsoft supplied font. You may use this font to create, display, and print content as permitted by the license terms or terms of use, of the Microsoft product, service, or content in which this font was included. You may only (i) embed this font in content as permitted by the embedding restrictions included in this font; and (ii) temporarily download this font to a printer or other output device to help print content. Any other use is prohibited.'
      14: 'https://docs.microsoft.com/typography/about'
    OS/2:
      achVendID: 'TMC '
      sTypoAscender: 1118
      sTypoDescender: -288
      sTypoLineGap: 0
      usWinAscent: 1118
      usWinDescent: 288
      fsType: 8
    STAT:
      axes:
        - tag: opsz
          name: Optical size
          ordering: 0
          values:
            - name: Small
              value: 6
            - name: Regular
              value: 16
              flags: 0x2
            - name: Disp
              value: 60
        - tag: wght
          name: Weight
          ordering: 1
          values:
            - name: Regular
              value: 400
              flags: 0x2
              linkedValue: 700
            - name: SmBd
              value: 600
            - name: Bold
              value: 700
            - name: XBd
              value: 800
  validation:
    profile_modules:
      - fontbakery.profiles.universal
      - fontbakery.profiles.microsoft